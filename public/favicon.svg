<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a0545"/>

  <!-- Taxi roof light / sign -->
  <rect x="22" y="12" width="20" height="7" rx="2" fill="#f5c518"/>
  <rect x="25" y="13.5" width="14" height="4" rx="1" fill="#1a0545"/>

  <!-- Taxi body -->
  <path d="M10 38 Q12 26 20 23 L26 21 Q30 20 34 20 L38 21 Q46 23 52 26 Q56 30 54 38 Z" fill="#f5c518"/>

  <!-- Windshield -->
  <path d="M22 23 L24 28 L40 28 L42 23 Q38 21 32 20.5 Q26 20 22 23 Z" fill="#0e0b1e" opacity="0.75"/>

  <!-- Side window -->
  <rect x="25" y="29" width="6" height="5" rx="1" fill="#0e0b1e" opacity="0.6"/>
  <rect x="33" y="29" width="6" height="5" rx="1" fill="#0e0b1e" opacity="0.6"/>

  <!-- Door line -->
  <line x1="32" y1="28" x2="32" y2="38" stroke="#d4a910" stroke-width="1"/>

  <!-- Bumper / base -->
  <rect x="10" y="37" width="44" height="4" rx="2" fill="#d4a910"/>

  <!-- Left wheel -->
  <circle cx="19" cy="41" r="6" fill="#1a0545"/>
  <circle cx="19" cy="41" r="4" fill="#333"/>
  <circle cx="19" cy="41" r="2" fill="#f5c518"/>

  <!-- Right wheel -->
  <circle cx="45" cy="41" r="6" fill="#1a0545"/>
  <circle cx="45" cy="41" r="4" fill="#333"/>
  <circle cx="45" cy="41" r="2" fill="#f5c518"/>

  <!-- Headlights -->
  <ellipse cx="53" cy="35" rx="3" ry="2" fill="#fffde7" opacity="0.9"/>
  <ellipse cx="11" cy="35" rx="3" ry="2" fill="#fffde7" opacity="0.9"/>

  <!-- Taxi stripe -->
  <rect x="10" y="33" width="44" height="3" rx="1" fill="#1a0545" opacity="0.3"/>
</svg>
